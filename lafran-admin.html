<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAFRAN | ADMIN DASHBOARD</title>
    
    <!-- External Styles -->
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/components.css">
    
    <style>
        :root {
            --admin-bg: #0a0a0a;
            --admin-glass: rgba(255, 255, 255, 0.03);
            --admin-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--admin-bg);
            color: var(--white);
            min-height: 100vh;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--admin-bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s ease;
        }

        .login-card {
            background: var(--admin-glass);
            border: 1px solid var(--admin-border);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.6s ease;
        }

        .pin-input-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }

        .pin-digit {
            width: 50px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--admin-border);
            border-radius: 12px;
            font-size: 1.5rem;
            text-align: center;
            color: var(--white);
            transition: 0.3s;
        }

        .pin-digit:focus {
            border-color: var(--accent-blue);
            outline: none;
            background: rgba(0, 212, 255, 0.05);
        }

        /* Dashboard Layout */
        .admin-main {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            pointer-events: none;
            transition: 0.5s;
        }

        body.logged-in .admin-main {
            opacity: 1;
            pointer-events: all;
        }

        body.logged-in #login-overlay {
            opacity: 0;
            pointer-events: none;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .admin-card {
            background: var(--admin-glass);
            border: 1px solid var(--admin-border);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }

        .admin-card-img {
            aspect-ratio: 1/1;
            width: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .admin-card-actions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .admin-card:hover .admin-card-actions {
            opacity: 1;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--admin-bg);
            border: 1px solid var(--admin-border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--admin-border);
            padding: 15px;
            border-radius: 10px;
            color: var(--white);
            font-family: inherit;
        }

        .image-dropzone {
            width: 100%;
            height: 200px;
            border: 2px dashed var(--admin-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .image-dropzone:hover {
            border-color: var(--accent-blue);
            background: rgba(0, 212, 255, 0.05);
        }

        .image-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .btn-logout {
            opacity: 0.5;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .btn-logout:hover {
            opacity: 1;
            color: #ff4d4d;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Login PIN Overlay -->
    <div id="login-overlay">
        <div class="login-card">
            <h1 class="logo" style="font-size: 2rem;">LAFRAN</h1>
            <p style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.5; margin-top: 10px;">DASHBOARD ACCESS</p>
            
            <div class="pin-input-group">
                <input type="password" maxlength="1" class="pin-digit" autofocus>
                <input type="password" maxlength="1" class="pin-digit">
                <input type="password" maxlength="1" class="pin-digit">
                <input type="password" maxlength="1" class="pin-digit">
            </div>
            
            <p id="login-error" style="color: #ff4d4d; font-size: 0.7rem; opacity: 0; transition: 0.3s;">SENHA INCORRETA</p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <main class="admin-main">
        <div class="admin-header">
            <div>
                <h2 style="font-size: 2.5rem; letter-spacing: -2px;">COLLECTION<br>MANAGER</h2>
                <span class="btn-logout" id="btn-logout">Sair do Painel</span>
            </div>
            <button class="btn-primary" id="btn-add-product">+ ADICIONAR PRODUTO</button>
        </div>

        <div class="admin-grid" id="admin-grid">
            <!-- Loading items will be injected here -->
            <p class="section-tag">CARREGANDO COLEÇÃO...</p>
        </div>
    </main>

    <!-- Modal Adicionar/Editar -->
    <div class="modal" id="admin-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 30px;">
                <h3 id="modal-title">NOVO PRODUTO</h3>
                <span onclick="closeModal()" style="cursor: pointer; font-size: 1.5rem;">&times;</span>
            </div>

            <form id="product-form">
                <input type="hidden" id="edit-id">
                
                <div class="form-group">
                    <label>FOTO DO PRODUTO</label>
                    <div class="image-dropzone" id="dropzone">
                        <span>CLIQUE OU ARRASTE A FOTO</span>
                        <img id="preview" class="image-preview">
                        <input type="file" id="file-input" hidden accept="image/*">
                    </div>
                </div>

                <div class="form-group">
                    <label>NOME DO PRODUTO</label>
                    <input type="text" id="p-name" placeholder="Ex: 333 AURA - BLACK" required>
                </div>

                <div class="form-row" style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label>COLEÇÃO</label>
                        <input type="text" id="p-collection" placeholder="Ex: 333 COLLECTION" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>PREÇO</label>
                        <input type="text" id="p-price" placeholder="Ex: R$ 189,90" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>DESCRIÇÃO</label>
                    <textarea id="p-desc" rows="4" placeholder="Detalhes do produto..."></textarea>
                </div>

                <div class="form-row" style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label>COR</label>
                        <input type="text" id="p-color" placeholder="Ex: Black">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>COR DE DESTAQUE (HEX)</label>
                        <input type="color" id="p-accent" value="#00d4ff" style="height: 50px; padding: 5px;">
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;" id="btn-save">SALVAR PRODUTO</button>
                <p id="upload-status" style="text-align: center; font-size: 0.7rem; margin-top: 15px; opacity: 0.5;"></p>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="src/scripts/admin.js"></script>

</body>
</html>
